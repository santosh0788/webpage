<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booking Preview</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    .box {
      background: white;
      padding: 30px;
      width: 420px;
      margin: auto;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    .details {
      text-align: left;
      margin-top: 15px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      font-size: 14px;
    }

    .row span:first-child {
      color: #555;
    }

    .price {
      font-weight: bold;
      color: green;
    }

    .confirm {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      background: green;
      color: white;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .confirm:hover {
      background: darkgreen;
    }

  </style>
</head>
<body>

<div class="box">
  <h2>Booking Preview ✈️</h2>

  <div class="details">
    <div class="row"><span>Flight:</span><span id="flight"></span></div>
    <div class="row"><span>Route:</span><span id="route"></span></div>
    <div class="row"><span>Time:</span><span id="time"></span></div>
    <div class="row"><span>Total Price:</span><span class="price" id="price"></span></div>
  </div>

  <button class="confirm" onclick="goToPayment()">Confirm Booking</button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);

  document.getElementById("flight").innerText = params.get("flight");
  document.getElementById("route").innerText = params.get("from") + " → " + params.get("to");
  document.getElementById("time").innerText = params.get("time");
  document.getElementById("price").innerText = "$" + params.get("price");

  function goToPayment() {
    const query = window.location.search;
    window.location.href = "payment.html" + query;
  }
</script>

</body>
</html>
