<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Explore World</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">⬛ LOGO</div>

  <nav>
    <a href="#">Home</a>
    <a href="#">About Us</a>
    <a href="#">Content</a>
    <a href="#">Contact</a>
  </nav>

  <div class="nav-right">
    <input type="text" placeholder="Search">
    <span class="menu">☰</span>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-left">
    <h1>Explore <br><span>the</span> World</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>

    <div class="form">
      <select>
        <option>Indonesia</option>
      </select>
      <select>
        <option>Japan</option>
      </select>
      <input type="date">
      <button>Search</button>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Bronze</h3>
        <h2>$300</h2>
      </div>
      <div class="card">
        <h3>Silver</h3>
        <h2>$400</h2>
      </div>
      <div class="card">
        <h3>Gold</h3>
        <h2>$500</h2>
      </div>
      <div class="card">
        <h3>Platinum</h3>
        <h2>$1000</h2>
      </div>
    </div>
  </div>

  <div class="hero-right">
    <div class="discount">20%<br>OFF</div>
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="travel">
  </div>
</section>

</body>
</html>
