<!DOCTYPE html>
<html>
<head><title>My Bookings</title></head>
<body>

<h2>My Bookings</h2>
<div id="list"></div>

<script>
const data = JSON.parse(localStorage.getItem("bookings")) || [];

data.forEach(b=>{
  document.getElementById("list").innerHTML += `
    <div>${b.flight} - ${b.from} → ${b.to} - $${b.price}</div>
  `;
});
</script>

</body>
</html>
